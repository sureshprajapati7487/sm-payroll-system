<!DOCTYPE html>
<html lang="en" style="background-color: #0f1419;">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f1419" />
  <title>SM Payroll System</title>

  <style>
    /* Splash Screen Styles */
    #splash-screen {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out;
    }

    #splash-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .splash-logo {
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: bold;
      color: white;
      margin-bottom: 24px;
      animation: pulse 2s ease-in-out infinite;
      box-shadow: 0 20px 60px rgba(59, 130, 246, 0.4);
    }

    .splash-title {
      font-size: 28px;
      font-weight: bold;
      color: white;
      margin-bottom: 8px;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .splash-subtitle {
      font-size: 14px;
      color: #9ca3af;
      margin-bottom: 32px;
    }

    .splash-loader {
      width: 200px;
      height: 4px;
      background: #1a1f2e;
      border-radius: 2px;
      overflow: hidden;
    }

    .splash-loader-bar {
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6);
      border-radius: 2px;
      animation: loading 1.5s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
        box-shadow: 0 20px 60px rgba(59, 130, 246, 0.4);
      }

      50% {
        transform: scale(1.05);
        box-shadow: 0 25px 70px rgba(59, 130, 246, 0.6);
      }
    }

    @keyframes loading {
      0% {
        transform: translateX(-100%);
      }

      100% {
        transform: translateX(400%);
      }
    }
  </style>
</head>

<body>
  <!-- Splash Screen -->
  <div id="splash-screen">
    <div class="splash-logo">SM</div>
    <div class="splash-title">SM Payroll System</div>
    <div class="splash-subtitle">Enterprise Edition</div>
    <div class="splash-loader">
      <div class="splash-loader-bar"></div>
    </div>
  </div>

  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>

  <script>
    // Hide splash screen after app loads
    window.addEventListener('load', () => {
      setTimeout(() => {
        const splash = document.getElementById('splash-screen');
        if (splash) {
          splash.classList.add('hidden');
          setTimeout(() => {
            splash.remove();
          }, 500);
        }
      }, 1000); // Show splash for at least 1 second
    });
  </script>
</body>

</html>
